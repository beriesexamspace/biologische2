<script>
window.BIO = {"questions":[{"t":"1","q":"Volgens het hoofdstuk waarom is biologie relevant voor psychologen?","o":["Omdat overerfbare eigenschappen in DNA bepalen welke eiwitten zoals neurotransmitters en receptoren worden aangemaakt, fysieke structuren die mee ons gedrag sturen","Omdat psychische processen volledig losstaan van het lichaam en apart bestudeerd moeten worden","Omdat alleen lichamelijke aandoeningen invloed hebben op gedrag, niet andersom","Omdat IQ uitsluitend door de omgeving wordt bepaald"],"a":0,"u":"DNA bepaalt de aanmaak van eiwitten (neurotransmitters, receptoren, neuronen), fysieke structuren die gedrag mee bepalen; bovendien is er wisselwerking tussen geest en lichaam in beide richtingen."},{"t":"1","q":"Wat betekent het dat de communicatie via actiepotentialen 'zwart of wit' is en wat is hiervan het nut?","o":["Het neuron vuurt of vuurt niet, zonder grijze zones, waardoor ruis wordt weggefilterd en B niet per ongeluk overgaat","Het neuron geeft een gradueel, analoog signaal door dat ruis versterkt","Het betekent dat elk actiepotentiaal van A altijd een actiepotentiaal in B veroorzaakt","Het zorgt ervoor dat neuronen traag maar met veel grijze tussenstappen reageren"],"a":0,"u":"Actiepotentialen kennen geen tussenwaarden (actie of geen actie); doordat A hard moet werken om B over de drempel te krijgen, wordt ruis eruit gefilterd en gaat B niet per ongeluk vuren."},{"t":"1","q":"Wat is het verschil tussen kwantitatieve en kwalitatieve integratie bij convergentie?","o":["Kwantitatieve integratie verzamelt meer input over hetzelfde onderwerp, kwalitatieve integratie combineert verschillende soorten informatie","Kwantitatieve integratie combineert verschillende zintuigen, kwalitatieve integratie telt dezelfde signalen op","Beide verwijzen naar het optellen van identieke informatie uit een type receptor","Kwantitatieve integratie hoort bij divergentie en kwalitatieve bij laterale inhibitie"],"a":0,"u":"Kwantitatieve integratie is een optelsom van dezelfde info (bv. meerdere fotoreceptoren bij schemering), terwijl kwalitatieve integratie verschillende informatiebronnen combineert (bv. licht plus hoofdpositie om locatie te bepalen)."},{"t":"1","q":"Welk netwerkprincipe verklaart dat een piramidaal neuron tot 10.000 spiervezelcellen kan laten samentrekken?","o":["Divergentie (versterking): een cel beinvloedt veel cellen, zodat enkele neuronen volstaan","Convergentie: veel neuronen sturen naar een neuron","Laterale inhibitie: naburige neuronen dempen elkaar","Coincidentiedetectie: het neuron vuurt enkel bij gelijktijdige input"],"a":0,"u":"Bij divergentie zijn er in de tweede laag meer neuronen dan in de eerste; de versterkingsvariant laat een neuron veel cellen aansturen, zoals een piramidaal neuron dat tot 10.000 spiervezels activeert."},{"t":"1","q":"Hoe verklaart het feedforward-netwerk in het pijnsysteem het verschil tussen scherpe en doffe pijn?","o":["A exciteert B (acute pijn) en ook C; C inhibeert B zodat de scherpe pijn dempt, waarna dieper gelegen neuron D via remming van C de doffere pijn weer doorlaat","A inhibeert zowel B als C, waardoor er nooit pijn ontstaat","Doffe pijn ontstaat doordat B continu blijft vuren zonder enige remming","Scherpe en doffe pijn worden door exact dezelfde receptor op dezelfde diepte gegenereerd"],"a":0,"u":"C dempt via feedforward de acute pijn van B zodat die snel ophoudt; het dieper gelegen neuron D werkt de inhibitie van C tegen, waardoor een doffere, minder gelokaliseerde pijn met voorzorgsfunctie ontstaat."},{"t":"1","q":"Wat is het kernprincipe van laterale inhibitie ('winner takes it all')?","o":["Naburige neuronen remmen elkaar, zodat het sterkst gestimuleerde neuron de buren overstemt en de stimulus nauwkeurig gelokaliseerd wordt","Alle neuronen versterken elkaar zodat de stimulus over een groot gebied wordt verspreid","Het neuron vuurt enkel als beide zijden gelijktijdig geprikkeld worden","De eerste laag bevat altijd meer neuronen dan de tweede laag"],"a":0,"u":"Bij laterale inhibitie remmen naburige neuronen elkaar; het neuron met de hoogste druk (bv. C) inhibeert zijn buren het sterkst, zodat enkel dat ene neuron doorgeeft waar de druk precies zit."},{"t":"1","q":"Wat is volgens de tekst het verschil tussen sensatie en perceptie?","o":["Sensatie is het objectief detecteren en omzetten van stimuli naar neurale activiteit; perceptie is de subjectieve interpretatie ervan door het centraal zenuwstelsel","Sensatie is subjectief en perceptie is objectief","Sensatie en perceptie zijn synoniemen voor hetzelfde proces","Sensatie gebeurt in de cortex en perceptie in de sensorische receptoren"],"a":0,"u":"Sensatie is het objectieve detecteren en omzetten van fysieke stimuli in neurale activiteit; perceptie is de subjectieve interpretatie, ervaring en reactie hierop door cellen in het centraal zenuwstelsel."},{"t":"1","q":"Waarom blijft een gefixeerd beeld toch zichtbaar ondanks dat receptoren bij constante stimulatie adapteren (microsaccades)?","o":["De ogen maken continu kleine bewegingen waardoor dezelfde fotoreceptor nooit lang exact dezelfde lichtinput krijgt, wat steeds een verschil oplevert","De fotoreceptoren stoppen volledig met adapteren zodra je fixeert","Het brein verzint het beeld los van enige receptorinput","Microsaccades vergroten de pupillen zodat meer licht binnenkomt"],"a":0,"u":"Door microsaccades verandert de positie van het netvlies steeds een beetje, zodat een receptor nooit lang dezelfde input krijgt; dit verschil voorkomt dat het beeld vervaagt, zoals bij het Troxler-effect waar fixatie de kat doet verdwijnen (behalve de tanden, het grootste contrast)."},{"t":"2","q":"Welke cellen in de retina zijn de enige die actiepotentialen genereren?","o":["Fotoreceptoren","Bipolaire cellen","Ganglioncellen","Horizontale cellen"],"a":2,"u":"In de volledige retina hebben enkel ganglioncellen axonen en genereren ze actiepotentialen; fotoreceptoren, bipolaire, horizontale en amacriene cellen werken met graded potentials."},{"t":"2","q":"Wat gebeurt er met het membraanpotentiaal van een fotoreceptor wanneer er licht op valt?","o":["Het depolariseert","Het hyperpolariseert","Het blijft volledig ongewijzigd","Het genereert direct een actiepotentiaal"],"a":1,"u":"Bij gewervelden werkt zicht omgekeerd: licht veroorzaakt hyperpolarisatie (inhibitie), terwijl fotoreceptoren maximaal gedepolariseerd zijn in het donker."},{"t":"2","q":"Waarom is de fovea de plek met het scherpste zicht?","o":["Daar liggen uitsluitend staafjes dicht opeengepakt","Daar is de convergentie minimaal (ongeveer 1-op-1) en zitten kegeltjes dicht op elkaar","Daar bevinden zich de meeste intrinsiek lichtgevoelige ganglioncellen","Daar valt het licht via extra brekende lagen op de receptoren"],"a":1,"u":"In de fovea is de verhouding ongeveer 1 fotoreceptor op 1 ganglioncel (privelijn), met enkel dicht opeengepakte kegeltjes, wat nauwkeurige lokalisatie en scherp zicht oplevert."},{"t":"2","q":"Waarom kun je een zwak lichtende ster beter zien door er net naast te kijken in plaats van er recht naar?","o":["Omdat de kegeltjes in de fovea gevoeliger zijn voor zwak licht","Omdat het licht dan op de blinde vlek valt die zwak licht versterkt","Omdat de hoogste dichtheid aan staafjes rond 20 graden van de fovea ligt, niet in de fovea","Omdat de optische zenuw daar het licht extra bundelt"],"a":2,"u":"Staafjes zijn gespecialiseerd in zwak licht en hun piekdichtheid ligt rond 20 graden van de fovea; door ernaast te fixeren valt het sterlicht op die staafjesrijke zone."},{"t":"2","q":"Welke neurotransmitter geven fotoreceptoren continu af, in een hoeveelheid die afhangt van de lichtintensiteit?","o":["GABA","Dopamine","Glutamaat","Acetylcholine"],"a":2,"u":"Fotoreceptoren geven continu glutamaat af als graded potential; bij depolarisatie (donker) veel, bij hyperpolarisatie (licht) weinig."},{"t":"2","q":"Wat is een belangrijk gevolg van de 'omgekeerde' opbouw van de retina, waarbij fotoreceptoren het verst van het inkomende licht liggen?","o":["Het licht wordt nergens verstrooid voordat het de receptoren bereikt","Steuncellen achteraan kunnen versleten fotopigmenten opruimen en recycleren","Er ontstaat geen blinde vlek","Fotoreceptoren kunnen zo regenereren na beschadiging"],"a":1,"u":"Door deze opbouw liggen de steun- en epitheelcellen achteraan, waar ze versleten fotopigmenten via fagocytose kunnen opruimen en recycleren; ook kan teruggekaatst licht een tweede kans krijgen."},{"t":"2","q":"Welke functie hebben horizontale cellen in de retina?","o":["Ze genereren actiepotentialen richting de oogzenuw","Ze verzorgen laterale inhibitie en negatieve feedback bij de contacten tussen fotoreceptoren en bipolaire cellen","Ze zetten vitamine A om in retinal","Ze vormen de verbinding tussen staafjesbipolaire cellen en ganglioncellen"],"a":1,"u":"Horizontale cellen leggen dwarsverbindingen en zorgen voor negatieve feedback en laterale inhibitie op het niveau van fotoreceptor-bipolaire-cel-contacten; amacriene cellen doen dit op het niveau van bipolaire/ganglioncellen."},{"t":"2","q":"Via welke route maken staafjes verbinding met de ganglioncellen?","o":["Rechtstreeks, net als kegeltjes","Via ON- en OFF-bipolaire cellen rechtstreeks","Via een enkel type ON-bipolaire cel en vervolgens amacriene cellen","Via horizontale cellen rechtstreeks naar het optisch zenuwhoofd"],"a":2,"u":"Staafjes hebben slechts een type (ON) bipolaire cel die enkel indirect, via amacriene cellen, contact maakt met de ganglioncellen."},{"t":"2","q":"Wat is het belangrijkste projectiestation in de thalamus voor de retinale ganglioncellen?","o":["De suprachiasmatische nucleus","De superieure colliculus","De laterale geniculate nucleus (LGN)","De pulvinar"],"a":2,"u":"De LGN in de thalamus is het belangrijkste projectiestation voor retinale ganglioncellen, met magno-, parvo- en koniocellulaire lagen."},{"t":"2","q":"Welke ganglioncellen projecteren naar de magnocellulaire lagen van de LGN en zijn geschikt voor bewegingsdetectie?","o":["Midget- (P-)cellen","Parasol- (M-)cellen","Bistratified cellen","Intrinsiek lichtgevoelige cellen"],"a":1,"u":"Parasolcellen (M-cellen) hebben een groot receptief veld en snelle conductie, projecteren naar de magnocellulaire lagen en zijn geschikt voor snelle bewegingsdetectie ('waar')."},{"t":"2","q":"Wat kenmerkt de midget- (P-)cellen ten opzichte van parasolcellen?","o":["Groot receptief veld en snelle, weinig nauwkeurige overdracht","Klein receptief veld, trage conductie en geschikt voor scherp, gedetailleerd zicht","Ze zijn intrinsiek lichtgevoelig en sturen de pupilreflex aan","Ze ontvangen uitsluitend input van blauwe kegeltjes"],"a":1,"u":"Midgetcellen krijgen input van weinig fotoreceptoren, hebben een klein receptief veld en trage conductie, wat scherp zicht mogelijk maakt; ze projecteren naar de parvocellulaire lagen."},{"t":"2","q":"Welke functie heeft de aftakking van enkele retinale vezels naar de suprachiasmatische nucleus?","o":["Het aansturen van de oogspieren en de lens","Het afstemmen van de biologische klok / dag-nachtritmiek","Het verwerken van kleurcontrasten","Het stabiliseren van het beeld tijdens oogbewegingen"],"a":1,"u":"De suprachiasmatische nucleus fungeert als centrale klok; informatie over de hoeveelheid licht stemt zo het bioritme af op het moment van de dag."},{"t":"2","q":"Wat houdt een center-surround receptief veld van een ON-ganglioncel in?","o":["Licht in zowel centrum als periferie verhoogt het vuren even sterk","Licht op het centrum verhoogt het vuren, licht op de periferie remt het","Licht op het centrum remt het vuren, licht op de periferie verhoogt het","De cel reageert alleen op kleur, niet op helderheid"],"a":1,"u":"Bij een ON-ganglioncel zorgt licht op het centrum voor excitatie en licht op de omringende ring voor inhibitie; het vuren weerspiegelt het verschil tussen beide."},{"t":"2","q":"Wat is de belangrijkste functie van laterale inhibitie in de retina?","o":["Het versterken van kleurconstantie over het hele veld","Het uitvergroten van contrasten en zo de gevoeligheid voor randen/contouren verhogen","Het continu doorgeven van onveranderlijke achtergrondinformatie","Het regenereren van versleten fotopigmenten"],"a":1,"u":"Laterale inhibitie leidt tot een 'winner takes it all'-effect dat het verschil tussen sterk en zwak gestimuleerde plekken uitvergroot, cruciaal voor het waarnemen van randen en contouren."},{"t":"2","q":"Hoe verschillen transiente (fasische) cellen van sustained (tonische) cellen?","o":["Transiente cellen blijven vuren zolang de stimulus duurt; sustained cellen alleen bij verandering","Transiente cellen reageren vooral op verandering en doven snel; sustained cellen blijven vuren tijdens de hele stimulus","Transiente cellen zijn kleurgevoelig; sustained cellen niet","Transiente cellen komen alleen in de fovea voor; sustained cellen alleen in de periferie"],"a":1,"u":"Transiente cellen (veel negatieve feedback) reageren sterk op veranderingen maar doven snel; sustained cellen (weinig negatieve feedback) blijven vuren zolang de stimulus aanhoudt."},{"t":"2","q":"Hoe codeert het visuele systeem geel terwijl er geen 'gele' kegeltjes bestaan?","o":["Blauwe kegeltjes worden dubbel zo sterk geactiveerd","Geel licht stimuleert zowel rode als groene kegeltjes, wat een geel-blauwe tegenkleurcel sterk activeert","Een aparte gele opsine wordt aangemaakt in de fovea","De koniocellulaire laag detecteert geel rechtstreeks"],"a":1,"u":"Geel licht ligt tussen rood en groen en stimuleert beide kegeltjes; bij de rood/groene cel heffen excitatie en inhibitie elkaar op, terwijl de geel/blauwe cel door beide wordt geexciteerd en sterk reageert."},{"t":"2","q":"Waardoor wordt protanopie (een vorm van rood-groen kleurenblindheid) veroorzaakt?","o":["Het volledig ontbreken van kegeltjes","Rode kegeltjes die gevuld zijn met groene kegelopsine waardoor ze zich als groene gedragen","Het ontbreken van blauwe kegeltjes","Schade aan gebied V4 in de cortex"],"a":1,"u":"Bij protanopie zijn de rode kegeltjes gevuld met groene opsine, dus gedragen ze zich als groene kegeltjes; de scherpte blijft normaal en de afwijking is X-chromosoomgebonden."},{"t":"2","q":"Wat is kleurconstantie?","o":["Het vermogen om kleuren exact volgens hun absolute golflengte waar te nemen","Het rekening houden met de omgeving zodat een object zijn kleur behoudt ondanks wisselende belichting","Het verlies van kleurzicht bij normale scherpte na hersenschade","Het verschijnsel dat nabeelden in tegengestelde kleuren verschijnen"],"a":1,"u":"Kleurconstantie betekent dat het brein de gemiddelde kleur van het hele veld als referentie gebruikt, zodat objecten herkenbaar blijven ondanks veranderende belichting; V4 speelt hierin een belangrijke rol."},{"t":"2","q":"Wat is het kenmerkende voordeel van spatiale frequentie (sinusoidale contrastroosters) als manier om beelden te representeren?","o":["Elk object heeft een eigen neuron, wat zeer nauwkeurig is","Het is een spaarzaam format omdat een rooster voor veel verschillende beelden bruikbaar is","Het werkt uitsluitend via de magnocellulaire route","Het maakt kleurcodering overbodig"],"a":1,"u":"Spatiale frequentie is spaarzaam: door verschillende contrastroosters op elkaar te leggen kun je met dezelfde cellen heel veel verschillende beelden representeren, in tegenstelling tot een dure een-neuron-per-object-code."},{"t":"2","q":"Wat verklaart het fenomeen blindsight?","o":["De fotoreceptoren zijn vernietigd maar de cortex compenseert","De verbinding tussen LGN en primaire visuele cortex is onderbroken, terwijl het colliculaire zicht intact blijft","De oogzenuw is volledig doorgesneden","Beide ogen missen de fovea"],"a":1,"u":"Bij blindsight is de route van LGN naar V1 onderbroken, maar via de intacte colliculaire route (vanaf het netvlies) wordt nog ruimtelijke en affectieve informatie onbewust verwerkt; een blinddoek heft het effect op omdat ook die route van het netvlies vertrekt."},{"t":"3","q":"Waarom heeft het middenoor met zijn gehoorbeentjes een versterkende functie nodig?","o":["Omdat het buitenoor te veel geluid breekt aan de oorschelp","Omdat luchtdrukgolven moeten worden omgezet naar bewegingen in de vloeistof van het binnenoor, dat veel meer weerstand biedt","Omdat het trommelvlies anders zou scheuren bij lage tonen","Omdat de haarcellen pas vanaf een bepaalde frequentie kunnen vuren"],"a":1,"u":"Het binnenoor is met vocht gevuld en water biedt veel meer weerstand dan lucht; de gehoorbeentjes zetten een grote, zwakke beweging om in een kleinere maar krachtigere beweging tegen het ovale venster."},{"t":"3","q":"Hoe codeert het basilaire membraan informatie over de toonhoogte van een geluid (tonotopie)?","o":["Hoge tonen buigen het membraan maximaal af nabij de basis, lage tonen nabij de apex","Lage tonen buigen het membraan maximaal af nabij de basis, hoge tonen nabij de apex","Alle frequenties buigen het membraan over de hele lengte even sterk af","De toonhoogte wordt enkel bepaald door de amplitude van de buiging, niet door de plaats"],"a":0,"u":"Het basilaire membraan is stijver/smaller aan de basis en soepeler/breder aan de apex; hierdoor veroorzaken hoge tonen maximale afbuiging vlakbij de basis en lage tonen vlakbij de apex."},{"t":"3","q":"Wat is een belangrijk verschil tussen de binnenste en de buitenste haarcellen?","o":["De binnenste haarcellen zijn essentieel voor horen, terwijl de buitenste vooral zorgen voor fine tuning via hun verbinding met het tectoriaal membraan","De buitenste haarcellen zijn essentieel voor horen, de binnenste hebben enkel een beschermende functie","Enkel de binnenste haarcellen kunnen onder efferente invloed van lengte veranderen","De binnenste haarcellen hangen vast aan het tectoriaal membraan, de buitenste niet"],"a":0,"u":"Binnenste haarcellen zijn onmisbaar voor het horen (muizen zonder binnenste haarcellen zijn doof), terwijl de buitenste haarcellen, verbonden aan het tectoriaal membraan, zorgen voor fine tuning en het filteren van frequenties."},{"t":"3","q":"Waardoor verschilt de subcorticale verwerking van gehoor sterk van die van het zicht?","o":["Bij gehoor blijven links en rechts strikt gescheiden tot in de cortex","Bij gehoor wordt informatie van beide oren al vroeg in de keten gecombineerd, onder meer in de superieure olijfkern (nucleus olivaris superior)","Bij gehoor is er nauwelijks subcorticale verwerking","Bij gehoor passeert alle informatie eerst de inferieure colliculus zonder kruising"],"a":1,"u":"Anders dan bij het visuele systeem (waar links en rechts grotendeels gescheiden blijven) wordt auditieve informatie van beide oren al heel vroeg (in de nucleus olivaris superior) samengebracht, wat cruciaal is voor het snel lokaliseren van geluid."},{"t":"3","q":"Welke twee verwerkingsstromen worden in de auditieve cortex onderscheiden, en wat doen ze?","o":["Een dorsale 'wat'-stroom en een ventrale 'waar'-stroom","Een anterieure stroom voor complex geluid ('wat') en een posterieure stroom voor lokalisatie ('waar')","Een anterieure stroom voor volume en een posterieure stroom voor toonhoogte","Een linker stroom voor lage tonen en een rechter stroom voor hoge tonen"],"a":1,"u":"De auditieve cortex kent een anterieure 'wat'-stroom (complex geluid, naar frontale gebieden) en een posterieure 'waar'-stroom (lokalisatie, naar parietale cortex), dissocieerbaar door laesies."},{"t":"3","q":"Waarom kan het auditieve systeem voor de laagste tonen de toonhoogte coderen via de vuurfrequentie van neuronen, maar niet voor de hoogste tonen?","o":["Omdat lage tonen geen plaatscodering op het membraan veroorzaken","Omdat een neuron niet bijvoorbeeld 20.000 keer per seconde kan vuren, zodat hoge tonen op plaats moeten worden gecodeerd","Omdat hoge tonen het basilaire membraan niet afbuigen","Omdat de cochlea pas vanaf hoge frequenties gevoelig wordt"],"a":1,"u":"Een neuron kan de frequentie van het geluid weerspiegelen in zijn vuurfrequentie bij lage tonen, maar geen 20.000 keer per seconde vuren; daarom worden hoge tonen gecodeerd door de plaats van de actieve haarcel (tonotopie)."},{"t":"3","q":"Met welk mechanisme lokaliseren we continue geluiden van hoge frequentie, nu faseverschillen tussen de oren onbruikbaar worden?","o":["Via verschillen in aankomsttijd tussen de oren","Via de geluidsschaduw (sonic shadow): de schedel absorbeert geluid, waardoor het verste oor iets minder volume ontvangt","Via tonotopie in het basilaire membraan","Via de inferieure colliculus die de fase corrigeert"],"a":1,"u":"Bij hoge frequenties zijn de faseverschillen te klein; daarom wordt de geluidsschaduw gebruikt: de schedel absorbeert een deel van het geluid zodat het verste oor een iets lager volume registreert (verwerkt door de nucleus olivaris superior lateralis)."},{"t":"3","q":"Hoe werkt de detectie van rotaties in de semicirculaire kanalen?","o":["De otoconia (oorzand) duwen tegen de gelatineuze massa bij elke rotatie","Door de traagheid van de endolymfe beweegt het vocht aanvankelijk niet mee, waardoor de cupula afbuigt en de haarcellen geprikkeld worden","De haarcellen reageren rechtstreeks op de zwaartekracht die op het hoofd inwerkt","Het tectoriaal membraan wordt scheefgetrokken door de rotatie"],"a":1,"u":"Bij een abrupte rotatie blijft de endolymfe door traagheid even achter terwijl het benige kanaal en de cupula al meedraaien; de daaruit volgende afbuiging van de cupula buigt de haarcellen (crista) en zorgt voor transductie."},{"t":"3","q":"Wat detecteren de vestibulaire zakjes (utriculus en sacculus) met hun maculae?","o":["Uitsluitend abrupte rotaties van het hoofd in drie vlakken","De positie van het hoofd en lineaire bewegingen/versnellingen, dankzij otoconia die aan de gelatineuze massa trekken","Enkel de hoge frequenties van geluid","De richting waaruit een geluidsbron komt"],"a":1,"u":"Het statische labyrint (utriculus en sacculus) is via de zwaartekracht op de otoconia gevoelig voor de positie van het hoofd en voor lineaire bewegingen, ook zonder rotatie."},{"t":"3","q":"Wat is een typisch kenmerk van Merkel-schijfjes ten opzichte van bijvoorbeeld Pacini-lichaampjes?","o":["Ze hebben een groot, slecht afgelijnd receptief veld en snelle adaptatie","Ze hebben een klein, scherp afgelijnd receptief veld en trage adaptatie, en blijven vuren onder aanhoudende druk","Ze reageren enkel op hoogfrequente trillingen op afstand","Ze bevinden zich enkel in behaarde huid"],"a":1,"u":"Merkel-schijfjes (SA1) hebben een klein, scherp afgelijnd receptief veld met laterale inhibitie en trage adaptatie, waardoor ze druk, vorm en textuur blijvend signaleren, ideaal voor randen en puntdruk. Pacini-lichaampjes (FA2) hebben juist een groot veld en snelle adaptatie."},{"t":"3","q":"Waarom voelt metaal bij dezelfde temperatuur warmer of kouder aan dan plastic?","o":["Omdat metaal een hogere absolute temperatuur heeft dan plastic","Omdat thermoceptoren temperatuurveranderingen van de huid detecteren en metaal warmte beter geleidt","Omdat metaal de TRPV1-receptor activeert en plastic de TRPM8-receptor","Omdat plastic capsaicine bevat"],"a":1,"u":"Vrije zenuwuiteinden meten de temperatuurverandering van de huid zelf, niet van het object; metaal geleidt warmte beter en verandert daardoor sneller de huidtemperatuur, wat de waargenomen warmte/koude bepaalt."},{"t":"3","q":"Wat illustreert het geval van de vrouw met een aangeboren ongevoeligheid voor pijn over de functie van pijn?","o":["Dat pijn volledig overbodig is voor overleving","Dat pijn een belangrijke beschermende alarmfunctie heeft, want zonder pijnperceptie loopt men voortdurend ongemerkt verwondingen op","Dat thermoceptie altijd samen met pijnperceptie verdwijnt","Dat pijn enkel emotioneel en niet sensorisch is"],"a":1,"u":"Door een genetische afwijking in het endogene cannabinoidesysteem voelde ze geen pijn (wel temperatuur en aanraking) en liep ze voortdurend kwetsuren op; dit toont de beschermende alarmfunctie van pijn."},{"t":"3","q":"Hoe verschilt de route van nauwkeurig gelokaliseerde tastinformatie van die van pijn- en temperatuurinformatie in het ruggenmerg?","o":["Pijn/temperatuur kruist pas in de medulla, fijne tast kruist meteen bij binnenkomst","Fijne tast stijgt eerst via de dorsale kolom en kruist pas in de medulla, terwijl pijn/temperatuur meteen kruist en via de spinothalamische baan stijgt","Beide kruisen meteen bij binnenkomst in het ruggenmerg","Fijne tast gaat niet naar de thalamus, pijn/temperatuur wel"],"a":1,"u":"Nauwkeurige tast stijgt via de dorsale kolom en kruist pas in de medulla (mediale lemniscus), terwijl minder precieze pijn-/temperatuurinformatie meteen kruist en via de spinothalamische baan stijgt; beide eindigen in de VPN-thalamus en de primaire somatosensorische cortex."},{"t":"3","q":"Hoe wordt het placebo-effect bij pijn biologisch verklaard volgens dit hoofdstuk?","o":["Door rechtstreekse blokkade van nociceptoren in de huid","Door projecties van de frontale cortex naar de periaqueductale grijze stof die de vrijgave van endogene opioiden aansturen","Door verhoogde activiteit van de buitenste haarcellen","Door otoconia die de pijnbaan afremmen"],"a":1,"u":"Verwachtingen activeren via de frontale cortex de periaqueductale grijze stof en het endogene opioidesysteem; dat naloxone (een opioide-antagonist) het placebo-effect verzwakt, bevestigt deze betrokkenheid."},{"t":"3","q":"Welke smaakkwaliteit detecteert de aanwezigheid van glutamaat en bepaalde proteinen?","o":["Zuur","Umami","Bitter","Vet"],"a":1,"u":"Umami ('hartig') detecteert de aanwezigheid van glutamaat en bepaalde proteinen; glutamaat wordt zelfs aan eten toegevoegd om de smaak te versterken."},{"t":"3","q":"Wat is een opvallend kenmerk van de corticale verwerking van geur, in tegenstelling tot de andere zintuigen?","o":["Alle geurinformatie passeert eerst de thalamus voor ze de cortex bereikt","De meeste geurinformatie bereikt de cortex zonder eerst via de thalamus te gaan, wat directe links met geheugen en emotie geeft","Geur wordt enkel in het cerebellum verwerkt","Geurinformatie kruist altijd naar de contralaterale hemisfeer voor verwerking"],"a":1,"u":"Anders dan de gebruikelijke route via de thalamus als schakelstation, bereikt het grootste deel van de geurinformatie de cortex rechtstreeks, wat de sterke directe band tussen geur, geheugen en emotie verklaart."},{"t":"4","q":"Waarom bevat een spiervezel meerdere celkernen (nuclei)?","o":["Omdat elke kern een ander type boodschapperstof aanmaakt","Omdat een spiervezel ontstaat door fusie van meerdere afzonderlijke cellen","Omdat de kernen nodig zijn om calcium uit de cel te pompen","Omdat elke myofibril zijn eigen kern vereist om samen te trekken"],"a":1,"u":"Een spiervezel is een fusie van verschillende individuele cellen; daardoor blijven meerdere oorspronkelijke kernen behouden."},{"t":"4","q":"Wat is het verband tussen het aantal spiervezels per axon en de fijnheid van een beweging?","o":["Hoe minder vezels per axon, hoe preciezer de beweging mogelijk is","Hoe meer vezels per axon, hoe preciezer de beweging mogelijk is","Het aantal vezels per axon staat los van de precisie","Alleen oogspieren hebben veel vezels per axon voor grove bewegingen"],"a":0,"u":"Bij precieze bewegingen bedient een axon weinig vezels (oogspieren circa 5 vezels/axon), terwijl grove bewegingen zoals de biceps veel vezels per axon hebben (circa 750)."},{"t":"4","q":"Wat maakt de communicatie aan de neuromusculaire junctie verschillend van een gewone synaps tussen twee neuronen?","o":["De eindplaat-potentiaal is zwakker, zodat slechts soms contractie volgt","Er wordt geen acetylcholine maar glycine vrijgegeven","Een actiepotentiaal in het motorneuron leidt altijd tot contractie van de spiervezel","De spiervezel bezit geen receptoren voor boodschapperstoffen"],"a":2,"u":"Anders dan tussen neuronen, waar een signaal vaak onder de drempel blijft, is de eindplaat-potentiaal zo sterk dat een actiepotentiaal in het motorneuron altijd contractie veroorzaakt."},{"t":"4","q":"Waarom duurt een spiercontractie veel langer dan de actiepotentiaal die haar in gang zet?","o":["Omdat acetylcholine traag wordt afgebroken in de synaptische spleet","Omdat de vrijgekomen Ca2+-ionen actief met een pompsysteem moeten worden verwijderd","Omdat de junctional folds de boodschapperstof langdurig vasthouden","Omdat ATP pas na de contractie wordt aangemaakt"],"a":1,"u":"De eindplaat-potentiaal geeft Ca2+ vrij in de vezel; dat calcium moet daarna actief teruggepompt worden, wat tijd kost en de contractie verlengt."},{"t":"4","q":"Een persoon probeert een te zwaar gewicht op te tillen zonder dat de spierlengte verandert. Welke receptor zal sterk vuren?","o":["De primaire stretchreceptor (MS2), gevoelig voor verandering","De secundaire stretchreceptor (MS1), gevoelig voor lengte","Het Golgi-peeslichaam, gevoelig voor spanning","De Pacini-lichaampjes in het gewricht, gevoelig voor vibratie"],"a":2,"u":"Bij constante lengte geven de stretchreceptoren weinig informatie, maar het Golgi-peeslichaam reageert sterk omdat er veel spanning op de pees staat."},{"t":"4","q":"Waarom is het voordelig dat de monosynaptische stretchreflex niet via de hersenen verloopt?","o":["Zodat de beweging bewust kan worden gecorrigeerd","Zodat de reflex bijzonder snel kan reageren op onvoorziene krachten","Zodat het brein meer acetylcholine kan vrijgeven","Zodat het Golgi-peeslichaam de spanning kan verhogen"],"a":1,"u":"Doordat het signaal de omweg via het brein niet hoeft te maken, kan de reflex zeer snel reageren (kniereflex circa 50 ms), wat nodig is voor evenwicht en het opvangen van onverwachte krachten."},{"t":"4","q":"Wat is de functie van de inhiberende Golgi-pees reflex en hoe verloopt deze?","o":["De spanning verhogen bij lage belasting, via een directe synaps","De spanning verminderen bij extreme belasting, via een interneuron met glycine (IPSP)","De spierlengte herstellen bij evenwichtsverlies, via een EPSP","De vuurfrequentie van het afferente neuron verlagen, zonder interneuron"],"a":1,"u":"Bij extreem hoge spanning werkt deze polysynaptische reflex via een interneuron remmend (IPSP via glycine) op het motorneuron, zodat de spier minder samentrekt en de pees niet losscheurt."},{"t":"4","q":"Welke uitspraak over de laterale en ventromediale groep dalende banen is juist?","o":["De laterale groep stuurt grove, gecoordineerde bewegingen van romp en proximale ledematen aan","De ventromediale groep stuurt onafhankelijke bewegingen van distale ledematen aan","De laterale groep stuurt onafhankelijke bewegingen van distale ledematen aan, de ventromediale groep grove gecoordineerde motoriek en postuur","Beide groepen sturen uitsluitend de oogbewegingen aan via het ruggenmerg"],"a":2,"u":"De laterale groep verzorgt onafhankelijke bewegingen van distale ledematen (rijken, grijpen), terwijl de ventromediale groep grove gecoordineerde motoriek, postuur en proximale ledematen aanstuurt."},{"t":"4","q":"In het apenexperiment met de drie lichtknoppen: welke rol vervult de premotorische cortex versus de SMA?","o":["De premotorische cortex is visueel geleid (cues), de SMA intern geleid (geheugen)","De premotorische cortex is intern geleid, de SMA visueel geleid","Beide reageren enkel wanneer de aap effectief beweegt, ongeacht de cue","De premotorische cortex stuurt rechtstreeks de spieren aan, de SMA het ruggenmerg"],"a":0,"u":"Neuronen in de premotorische cortex vuren vooral in de conditie met lampjes (extern/visueel geleid), terwijl SMA-neuronen vooral vuren bij intern geleide, gememoriseerde sequenties; M1 vuurt bij beweging ongeacht de cue."},{"t":"4","q":"Wat toont het klassieke 'readiness potential' (Bereitschaftspotential) experiment aan over vrijwillige beweging?","o":["De bewuste beslissing om te bewegen gaat vooraf aan alle hersenactiviteit","Opbouw van hersenactiviteit (circa 550 ms voor de beweging) begint al voor het bewuste besluit (circa 200 ms ervoor)","Het readiness potential treedt het sterkst op bij automatische, ongewilde bewegingen","Spieractiviteit start eerder dan de meetbare hersenactiviteit"],"a":1,"u":"De EEG-opbouw begint ongeveer 550 ms voor de beweging, terwijl het subjectieve wilsmoment pas rond 200 ms ervoor ligt; de hersenactiviteit gaat dus vooraf aan de bewuste beslissing."},{"t":"4","q":"Hoe verschillen de directe en de indirecte route van de basale ganglia in nettowerking?","o":["De directe route geeft netto inhibitie, de indirecte route netto excitatie van de cortex","Beide routes geven netto excitatie omdat ze evenveel inhibitoire stappen bevatten","De directe route geeft netto excitatie (even aantal inhibities), de indirecte netto inhibitie (oneven aantal)","De indirecte route omzeilt de globus pallidus volledig"],"a":2,"u":"De directe route bevat een even aantal inhibitoire schakels en werkt netto exciterend; de indirecte route heeft via Gpe en de subthalamische nucleus extra remstappen (oneven aantal), wat netto inhibitie oplevert."},{"t":"4","q":"Waarom geeft het afsterven van dopaminerge neuronen bij de ziekte van Parkinson bewegingsproblemen?","o":["Minder excitatie van de directe route en minder inhibitie van de indirecte route, samen netto te veel remming","Te veel excitatie van de directe route waardoor bewegingen ongecontroleerd worden","Degeneratie van GABAnerge neuronen in het striatum waardoor de rem wegvalt","Verhoogde dopaminesecretie die de thalamus overprikkelt"],"a":0,"u":"Dopamine exciteert via D1 de directe route en remt via D2 de indirecte; bij dopaminetekort wordt de directe route minder geexciteerd en de indirecte minder geremd, met netto te veel inhibitie en moeite om bewegingen te initieren."},{"t":"4","q":"Hoe verklaart corollary discharge waarom je jezelf niet kunt kietelen?","o":["De afferente zintuiglijke informatie bereikt het brein sneller dan de eigen beweging","Een kopie van het motorische commando voorspelt de sensatie, waardoor die wordt gedempt","De primaire motorische cortex blokkeert alle aanraking van de eigen huid","Spiegelneuronen onderdrukken de prikkel omdat de handeling vertrouwd is"],"a":1,"u":"Bij eigen beweging vertrekt een efferente kopie (corollary discharge) die de verwachte sensorische gevolgen voorspelt en dempt; daardoor voelt zelf-kietelen niet als kietelen, terwijl een onvoorspelbare vertraging (kietelrobot) dat effect wel mogelijk maakt."},{"t":"5","q":"Welke EEG-frequentieband wijst op de sterkst gesynchroniseerde toestand, waarbij de meeste neuronen ongeveer hetzelfde doen?","o":["Gamma-activiteit","Beta-activiteit","Delta-activiteit","Alpha-activiteit"],"a":2,"u":"Delta-golven hebben een zeer grote amplitude en een lage frequentie; om ze te genereren moeten veel neuronen 'in dezelfde pas' lopen, wat duidt op maximale synchronisatie. Gamma is juist een cacofonie van desynchrone neuronen."},{"t":"5","q":"Een proefpersoon doet de ogen dicht in een donkere ruimte. Wat gebeurt er volgens de klassieke inhibitievisie met de alpha-activiteit?","o":["Ze neemt toe, omdat alpha onder meer signaalverwerking onderdrukt","Ze verdwijnt volledig en wordt vervangen door delta","Ze blijft onveranderd, want licht heeft er geen invloed op","Ze daalt sterk omdat de visuele cortex actiever wordt"],"a":0,"u":"Alpha is sterker bij gesloten dan bij open ogen, zelfs in het donker, en wordt in de klassieke visie geassocieerd met inhibitieprocessen die signaalverwerking onderdrukken."},{"t":"5","q":"Tijdens welk slaapstadium ervaart een net gewekte persoon vaak nog niet dat hij sliep, terwijl het EEG K-complexen en slaapspoelen toont?","o":["NREM1","NREM2","NREM3 (SWS)","REM-slaap"],"a":1,"u":"In NREM2 verschijnen K-complexen en slaapspoelen, maar de subjectieve beleving komt niet overeen met de EEG-definitie: gewekte personen zeggen vaak dat ze niet sliepen."},{"t":"5","q":"Hoe verandert de hoeveelheid trage golf slaap (SWS) typisch in de loop van een nacht van 8 uur?","o":["Ze blijft per cyclus constant","Ze wordt met elke cyclus langer","Ze wordt met elke cyclus korter en verdwijnt vaak in de tweede helft","Ze komt alleen in de laatste cyclus voor"],"a":2,"u":"SWS is in de eerste cyclus het langst en wordt daarna steeds korter; in de tweede helft van de nacht treedt meestal geen SWS meer op, terwijl REM juist langer wordt."},{"t":"5","q":"Waarom is de prefrontale cortex relatief weinig actief tijdens de REM-slaap, en wat is daarvan een vermoedelijk gevolg?","o":["Hij verwerkt retinale input, waardoor dromen levendig en scherp ogen","Hij is minder betrokken, wat de onlogische, gedesorganiseerde droomstructuur kan verklaren","Hij stuurt de spierverlamming aan, waardoor je niet kunt bewegen","Hij produceert melatonine, waardoor je dieper droomt"],"a":1,"u":"De prefrontale cortex (plannen, redeneren, structureren) is minder actief in REM; deze verminderde betrokkenheid wordt gelinkt aan het onlogische en weinig planmatige karakter van dromen."},{"t":"5","q":"Wat leerde de case van Randy Gardner (264 uur wakker) over het 'inhalen' van gemiste slaap?","o":["Elk gemist uur wordt exact terugbetaald met een uur extra slaap","Gemiste slaap wordt nooit ingehaald en heeft geen gevolgen","Slaap is geen banksysteem: niet alle uren worden ingehaald, maar wel disproportioneel veel SWS","Vooral NREM1 en NREM2 worden ingehaald, SWS niet"],"a":2,"u":"Hij sliep daarna 15, 10 en 9 uur en haalde ongeveer 67 uur nooit in; bij rebound wordt vooral SWS (en REM) disproportioneel ingehaald, niet elk gemist uur afzonderlijk."},{"t":"5","q":"In het rattenexperiment met de roterende schijf boven water bleef de gedepriveerde rat motorisch even actief als de controlerat. Wat was de uitkomst voor het lichaam van de gedepriveerde rat?","o":["Duidelijke structurele orgaanschade en weefseldegeneratie","Geen manifeste structurele schade, maar wel coordinatieverlies, zelfverwaarlozing en uiteindelijk de dood","Volledig herstel zonder enige gedragsverandering","Alleen een lichte, tijdelijke daling van het IQ"],"a":1,"u":"Er was geen aantoonbare structurele schade aan brein of lichaam, maar wel coordinatieverlies, zelfverwaarlozing, veel eten, dalende lichaamstemperatuur en uiteindelijk altijd de dood."},{"t":"5","q":"Uit het experiment van Mednick et al. (2003) met een non-declaratieve visuele discriminatietaak: welke slaapconditie leidde tot een prestatie die BETER was dan aan het einde van de ochtendtraining?","o":["Geen dutje","Een dutje met enkel SWS","Een dutje met zowel SWS als REM","Wakker blijven met cafeine"],"a":2,"u":"Zonder dutje daalde de prestatie; enkel SWS hield de prestatie ongeveer gelijk; pas een dutje met zowel SWS als REM gaf een verbetering, wat wijst op de rol van REM bij non-declaratief leren."},{"t":"5","q":"Hoe werkt cafeine volgens dit hoofdstuk op het slaap-waaksysteem?","o":["Het verhoogt de aanmaak van adenosine","Het blokkeert adenosinereceptoren, waardoor de inhiberende werking van adenosine wordt opgeschort","Het breekt glycogeen af in de astrocyten","Het stimuleert direct de productie van noradrenaline"],"a":1,"u":"Cafeine is een antagonist die de adenosinereceptoren blokkeert; daardoor kan adenosine zijn inhiberende werking niet uitoefenen en blijf je langer wakker, ook al is de slaapschuld hoog. Het geeft dus geen energie maar dempt het moe-gevoel."},{"t":"5","q":"Welke neurotransmitter is, in tegenstelling tot de andere waakstoffen, OOK hoog actief tijdens de REM-slaap?","o":["Noradrenaline","Serotonine","Acetylcholine","Histamine"],"a":2,"u":"Acetylcholine is hoog tijdens waken en REM omdat het meer met mentale/corticale activiteit correleert dan met de waak-slaaptoestand; noradrenaline, serotonine, histamine en orexine zijn juist laag in REM."},{"t":"5","q":"Wat is een belangrijk gevolg van degeneratie van het orexinerge (hypocretine) systeem?","o":["Fatale familiale insomnie","Narcolepsie, met onder meer slaapaanvallen overdag","Advanced sleep phase syndrome","Pavor nocturnis bij kinderen"],"a":1,"u":"Orexine exciteert nagenoeg alle waaksystemen en stabiliseert de flip-flop; degeneratie van orexinerge neuronen maakt de REM-flip-flop instabiel en veroorzaakt narcolepsie (abrupt in slaap vallen, REM-intrusies)."},{"t":"5","q":"Wat is het belangrijkste verschil tussen kataplexie en gewone slaapverlamming bij narcolepsie?","o":["Kataplexie treedt op tijdens volle waaktoestand zonder bewustzijnsverlies, slaapverlamming juist net voor of na de slaap","Bij kataplexie verlies je het bewustzijn, bij slaapverlamming niet","Kataplexie wordt veroorzaakt door te veel adenosine, slaapverlamming door te weinig","Slaapverlamming treedt op tijdens volle waak, kataplexie alleen 's nachts"],"a":0,"u":"Kataplexie is een verslapping van de spieren tijdens volledige waaktoestand (zonder bewustzijnsverlies), vaak getriggerd door emotie; slaapverlamming is REM-verlamming die nog even doorwerkt vlak voor of na de slaap."},{"t":"5","q":"Hoe werkt de 'klok' in een geisoleerde cel van de nucleus suprachiasmaticus volgens het besproken basisconcept?","o":["Via een constant elektrisch signaal dat exact om de 24 uur vuurt","Via een negatieve feedbacklus waarbij een eiwit zijn eigen aanmaak blokkeert; synthese en afbraak kosten tijd","Via melatonine dat door de cel wordt opgenomen uit het bloed","Via lichtgevoelige melanopsine in de cel zelf"],"a":1,"u":"Het 'tikken' berust op een negatieve feedbacklus: bij hoge eiwitconcentratie blokkeert het eiwit zijn eigen synthese, waarna het wordt afgebroken en de productie herstart. De benodigde synthese- en afbraaktijd vormt de klok; geisoleerde SCN-cellen vertonen dit autonoom."},{"t":"6","q":"Welke hersenstructuur wordt in dit hoofdstuk beschreven als de regio die niet alleen op dreiging maar ook op opportuniteiten reageert en die de HPA-as mee aanstuurt?","o":["Hippocampus","Amygdala","Locus coeruleus","Periaqueductaal grijs (PAG)"],"a":1,"u":"De amygdala (angst) reageert zowel op dreiging als op opportuniteit en is een van de belangrijkste regio's die de HPA-as aanstuurt."},{"t":"6","q":"Wat is het belangrijkste onderscheid tussen het sympathisch-bijniermerg(SAM)-systeem en de HPA-as bij de stressrespons?","o":["Het SAM-systeem werkt traag via cortisol, terwijl de HPA-as snel adrenaline vrijgeeft","Het SAM-systeem geeft snel (nor)adrenaline vrij, terwijl de HPA-as trager glucocorticoïden vrijgeeft","Beide systemen werken even snel maar via verschillende hersengebieden","Het SAM-systeem werkt enkel in de hersenen, de HPA-as enkel in het lichaam"],"a":1,"u":"Het SAM-systeem geeft snel (nor)adrenaline (catecholamines) vrij voor de directe sympathische boost; de HPA-as geeft trager glucocorticoïden zoals cortisol vrij."},{"t":"6","q":"Welke volgorde beschrijft correct de hormonale cascade van de HPA-as?","o":["Hypofyse (CRH) → hypothalamus (ACTH) → bijnierschors (glucocorticoïden)","Bijniermerg (ACTH) → hypothalamus (CRH) → hypofyse (cortisol)","Hypothalamus (CRH) → hypofyse (ACTH) → bijnierschors (glucocorticoïden)","Amygdala (cortisol) → hypothalamus (CRH) → bijniermerg (ACTH)"],"a":2,"u":"De PVN van de hypothalamus geeft CRH af, dat de hypofyse aanzet tot ACTH, dat via het bloed de bijnierschors aanzet tot afgifte van glucocorticoïden (vb. cortisol)."},{"t":"6","q":"Op welke manier helpt de hippocampus bij het beëindigen van de acute stressrespons?","o":["Door rechtstreeks adrenaline af te breken in het bloed","Via negatieve feedback die de HPA-as-activiteit doet afnemen","Door extra CRH aan te maken om de respons te versterken","Door de bijnierschors te stimuleren tot meer cortisol"],"a":1,"u":"GC-receptoren in o.a. de hippocampus sturen negatieve feedback aan die de excitatie naar de HPA-as vermindert, waardoor het systeem terugkeert naar het basaal niveau."},{"t":"6","q":"Een rat krijgt tijdens een stressor een vertraagde hartslag en blijft motorisch stil. Welke respons en onderliggend mechanisme passen hierbij?","o":["Fight-respons, gedomineerd door het sympathisch systeem","Flight-respons, gedreven door verhoogde catecholamines","Freeze-respons, met een parasympathische rem op de sympathische respons","Acute stressrespons, gedreven door glucocorticoïden"],"a":2,"u":"De freeze-respons gaat gepaard met hartslagvertraging en motorische verstilling, waarbij de parasympathische divisie een rem zet op de in gang geschoten sympathische respons."},{"t":"6","q":"Volgens het hoofdstuk vermindert de toediening van een adrenaline-antagonist meteen na een trauma de kans op PTSD. Wat is hiervan de verklaring?","o":["Adrenaline versterkt de geheugenvorming, dus blokkeren ervan verzwakt het trauma-geheugen","Adrenaline vernietigt hippocampale neuronen die nodig zijn voor herstel","De antagonist verhoogt de cortisolniveaus en kalmeert zo de amygdala","Adrenaline onderdrukt het immuunsysteem dat het trauma zou verwerken"],"a":0,"u":"Het SAM-systeem (adrenaline) versterkt het geheugen; een antagonist meteen na het trauma verzwakt die inprenting en verlaagt zo de kans op PTSD."},{"t":"6","q":"Hoe verklaart het hoofdstuk dat chronische stress kan leiden tot diabetes (chronische hyperglycemie)?","o":["Glucocorticoïden zetten via een suppressieve interactie het immuunsysteem stil","Glucocorticoïden werken permissief en verhogen enkel de bloeddruk","Glucocorticoïden werken stimulatoir en zetten vetten om in bruikbare suikers","Catecholamines leggen de spijsvertering permanent stil"],"a":2,"u":"Via de stimulatoire interactie met het SAM-systeem zetten glucocorticoïden vet om in direct bruikbare suikers; bij veel stress leidt dit tot chronisch te hoge bloedsuiker en diabetes."},{"t":"6","q":"Bij de Hongerwinter ('45) werd een verhoogde kans op diabetes en zwaarlijvigheid vastgesteld bij nakomelingen/kleinkinderen. Welke visie op vroege stress sluit hier het best bij aan?","o":["Developmental constraint: de stress veroorzaakt onvermijdelijke schade als prijs voor KT-overleving","Predictieve adaptieve respons: de stofwisseling wordt afgestemd op een verwachte schaarse omgeving","Habituatie: de respons neemt af door herhaalde blootstelling","Sensitisatie: het systeem wordt steeds gevoeliger voor dreiging"],"a":1,"u":"Bij de predictieve adaptieve respons wordt de stofwisseling gekalibreerd op een verwachte context van weinig eten, waardoor het lichaam zoveel mogelijk als vet opslaat."},{"t":"6","q":"Wat toonde het onderzoek met de hinderlijke geluiden en een (illusoire) controleknop aan over mentale stress?","o":["Mensen met een externe locus van controle gaven meer cortisol vrij dan mensen met een interne locus","De knop verlaagde objectief het volume en dus de cortisolafgifte","Voorspelbaarheid had geen invloed op de cortisolniveaus","Mensen zonder knop hadden steeds de laagste cortisolwaarden"],"a":0,"u":"Waargenomen controle vermindert stress: mensen met een externe locus van controle ('ik heb toch geen invloed') gaven meer glucocorticoïden vrij dan mensen met een interne locus."},{"t":"6","q":"Hoe verklaart de psycho-neuro-immunologie dat wonden bij chronisch gestreste mantelzorgers trager genezen?","o":["Glucocorticoïden stimuleren de cytokineproductie en versnellen zo de ontsteking","Glucocorticoïden verstoren het cytokine-boodschappersysteem en onderdrukken zo de immuunrespons","Adrenaline vernietigt rechtstreeks de witte bloedcellen in de wond","Stress verhoogt de neurogenese waardoor energie wordt weggetrokken van de huid"],"a":1,"u":"Cytokines reguleren de immuunrespons, maar glucocorticoïden verstoren dit boodschappersysteem en onderdrukken zo de immuniteit, wat de wondgenezing vertraagt."}],"theory":[{"h":"Inleiding","items":["Synaps: de contactplaats tussen twee neuronen waar het ene neuron via boodschapperstoffen het andere kan beïnvloeden.","Actiepotentiaal: een alles-of-niets-vuursignaal van een neuron dat er is of niet, zonder tussenliggende grijze zone, zodat ruis wordt weggefilterd.","Rustpotentiaal: de actief negatief gehouden membraantoestand van een neuron in rust, die helpt om kleine ruissignalen te onderdrukken.","Excitatoire postsynaptische potentiaal: een prikkelend signaal van het ene neuron dat de membraanspanning van het ontvangende neuron iets positiever maakt en het dichter bij vuren brengt.","Convergentie: een netwerkopbouw waarbij een ontvangende laag minder neuronen telt dan de zendende laag, zodat elk neuron input van meerdere bronnen integreert.","Divergentie: een netwerkopbouw waarbij de tweede laag meer neuronen bevat dan de eerste, zodat informatie zich splitst of een enkel neuron veel cellen aanstuurt.","Laterale inhibitie: een winner-takes-all-mechanisme waarbij naburige receptoren elkaar afremmen zodat alleen het sterkst gestimuleerde neuron doorvuurt en de stimulus scherp gelokaliseerd wordt.","Coïncidentiedetector: een neuron dat pas vuurt wanneer het tegelijk vanuit twee kanten geprikkeld wordt, wat onder meer helpt bij het lokaliseren van geluid.","Sensatie: het objectieve detecteren van een fysieke omgevingsprikkel door zintuigreceptoren en het omzetten ervan in neurale activiteit.","Perceptie: de subjectieve interpretatie en beleving van sensaties door cellen in het centraal zenuwstelsel.","Transductie: de omzetting van een fysieke prikkel naar een verandering van het membraanpotentiaal in een sensorische receptorcel.","Adaptatie (relatieve gevoeligheid): de neiging van zintuigen om vooral op veranderingen te reageren en te wennen aan een constant stimulusniveau, zodat waarneming relatief is ten opzichte van de situatie."]},{"h":"Zicht","items":["Fotoreceptoren: lichtgevoelige zintuigcellen in de retina (staafjes en kegeltjes) die zonder axonen werken en hun signaal alleen via glutamaat doorgeven aan de volgende cellaag.","Staafjes: talrijke fotoreceptoren aan de rand van het netvlies die al door zeer weinig licht worden geprikkeld, geen kleur zien en zorgen voor grof nachtzicht en bewegingsdetectie.","Kegeltjes: fotoreceptoren die fel licht nodig hebben, in drie types (rood, groen, blauw) voor kleurzien zorgen en, geconcentreerd in de fovea, scherp zicht leveren.","Fovea: het kuiltje in het centrum van de retina met uitsluitend dicht opeengepakte kegeltjes, waar je zicht het scherpst is en waarop je fixeert.","Ganglioncellen: de enige retinacellen met axonen en actiepotentialen; hun axonen vormen samen de oogzenuw die de visuele informatie naar de hersenen stuurt.","Convergentie: het verschijnsel dat veel fotoreceptoren samen aansluiten op één ganglioncel (gemiddeld ongeveer 100 op 1), waardoor scherpte inruilt tegen lichtgevoeligheid.","Hyperpolarisatie van fotoreceptoren: tegen-intuitieve werking waarbij licht de fotoreceptor remt in plaats van prikkelt, zodat hij juist in het donker maximaal glutamaat afgeeft.","Laterale inhibitie: onderdrukking van naburige cellen door horizontale en amacriene cellen, waardoor verschillen worden uitvergroot en randen en contouren scherper worden waargenomen.","Center-surround receptief veld: het cirkelvormige gevoeligheidsgebied van een ganglioncel dat tegengesteld reageert op licht in het midden versus de rand (ON- of OFF-patroon), ideaal voor het detecteren van contrast en beweging.","Dorsale stroom: de waar-route die vanaf V1 naar de parietale kwab loopt, vooral magnocellulaire input krijgt en snel locatie en beweging van objecten verwerkt.","Ventrale stroom: de wat-route die vanaf V1 naar de temporaalkwab loopt en objecten herkent en identificeert op basis van vorm, kleur en detail.","Trichromatisch zicht: het menselijke kleursysteem met drie kegeltjestypes (rood, groen, blauw) waarmee via tegengestelde kleurparen het volledige kleurengamma wordt gecodeerd.","Kleurconstantie: het constructieve proces waarbij het brein de gemiddelde belichting van de omgeving meerekent zodat een object zijn vertrouwde kleur lijkt te houden, ongeacht het feitelijke licht.","Spatiale frequentie: een zuinige manier om beelden voor te stellen via sinusvormige patronen van licht-donker strepen, waarbij lage frequenties grove contouren van veraf en hoge frequenties fijne details van dichtbij weergeven.","Visuele low road: een snelle, evolutionair oude route via de superieure colliculus en pulvinar naar de amygdala die dreiging in gezichten sneller verwerkt dan de bewuste visuele cortex.","Prosopagnosie: het onvermogen om gezichten te herkennen door beschadiging van het Fusiform Face Area, waarbij mensen vaak nog wel op stem, kapsel of kledij identificeren."]},{"h":"Gehoor, evenwicht, tast, smaak en geur","items":["Transductie (binnenoor): het omzetten van mechanische trillingen in zenuwsignalen, wat plaatsvindt in het binnenoor terwijl buiten- en middenoor enkel het geluid doorgeven en versterken.","Tonotopie: de ordening waarbij elke geluidsfrequentie het basilair membraan op een vaste plek maximaal doet afbuigen, met hoge tonen aan de smalle, stijve basis en lage tonen aan de bredere, soepele top.","Haarcellen: de zintuigcellen met trilhaartjes (cilia) die zelf geen actiepotentialen vuren, maar bij afbuiging via tip-links ionkanalen openen, depolariseren en glutamaat afgeven aan de gehoorzenuw.","Binaurale verschillen: het brein vergelijkt aankomsttijd, fase en volume van geluid tussen beide oren om te bepalen waar een geluidsbron zich bevindt.","Vestibulair systeem: het evenwichtsorgaan in het binnenoor dat met halfcirkelvormige kanalen rotaties van het hoofd registreert en met de vestibulaire zakjes de positie en lineaire versnelling ten opzichte van de zwaartekracht meet.","Vestibulo-oculaire reflex: een automatische tegenbeweging van de ogen op hoofdbewegingen, zodat het beeld stabiel blijft tijdens bewegen.","Mechanoreceptoren van de huid: gespecialiseerde tastontvangers (zoals Merkel-schijfjes, Meissner-, Ruffini- en Pacini-lichaampjes) die elk verschillen in adaptatiesnelheid en grootte van het receptief veld en zo druk, contouren, rek of trilling detecteren.","Nociceptie: de waarneming van mogelijke weefselschade via vrije zenuwuiteinden, waarbij de uiteindelijke pijnbeleving sterk wordt gekleurd door processen in het brein.","Endogene analgesie: het lichaamseigen pijnstilsysteem waarbij de periaqueductale grijze stof opioïden vrijgeeft die pijnsignalen in het ruggenmerg onderdrukken, wat onder meer het placebo-effect mogelijk maakt.","Smaak als chemisch zintuig: smaak ontstaat doordat in speeksel opgeloste moleculen binden aan receptorcellen in de smaakknoppen en is beperkt tot enkele kwaliteiten (zoet, zout, zuur, bitter, umami en vet).","Reuk als chemisch zintuig: vluchtige, vooral vetoplosbare moleculen lossen op in het neusslijmvlies en activeren receptorcellen, waarbij geurinformatie grotendeels rechtstreeks (zonder tussenstop in de thalamus) naar cortex, emotie- en geheugengebieden gaat.","Combinatorische geurcodering: het brein onderscheidt duizenden geuren met slechts enkele honderden receptortypes doordat elke geurstof een eigen patroon van geactiveerde glomeruli oproept dat samen die geur vertegenwoordigt."]},{"h":"Motoriek","items":["Motor unit: een motorneuron samen met alle spiervezels die het aanstuurt; kleine units (zoals in oogspieren) maken fijne bewegingen mogelijk, grote units (zoals in de biceps) grovere.","Neuromusculaire junctie: het contactpunt tussen een efferent motorneuron en een spiervezel, waar acetylcholine wordt vrijgegeven dat via de eindplaatpotentiaal altijd een contractie uitlokt.","Spierspoel: receptororgaantje in de spier met primaire stretchreceptoren (gevoelig voor verandering/snelheid van lengte) en secundaire stretchreceptoren (gevoelig voor de absolute spierlengte).","Golgi-peeslichaam: receptor in de overgang tussen spier en pees die de spanning meet in plaats van de lengte, en bij extreme spanning via een reflex de contractie afremt om de pees te beschermen.","Monosynaptische stretchreflex: het simpelste reflexcircuit waarbij een afferent neuron uit de spierspoel rechtstreeks het motorneuron van dezelfde spier prikkelt, waardoor een snelle correctie van de spierlengte ontstaat zonder tussenkomst van het brein.","Polysynaptische reflex: reflex met minstens één tussengeschakeld interneuron, zoals de Golgi-peesreflex die via inhibitie de spierspanning verlaagt bij dreigende overbelasting.","Laterale versus ventromediale banen: dalende banen die respectievelijk onafhankelijke, fijne bewegingen van distale ledematen verzorgen versus grove, gecoordineerde bewegingen, houding en romp/proximale spieren.","Primaire motorische cortex (M1): somatotopisch georganiseerd hersengebied (homunculus) van waaruit impulsen naar specifieke spieren vertrekken; neuronen vuren zodra de beweging start, ongeacht welke aanleiding er was.","Premotorische cortex en SMA: associatiegebieden die bewegingssequenties plannen, waarbij de premotorische cortex vooral op externe/arbitraire cues reageert en de SMA op intern aangestuurde, uit het geheugen opgeroepen bewegingen.","Readiness potential: opbouw van hersenactiviteit in de (pre-)SMA die al honderden milliseconden vóór de bewuste beslissing om te bewegen meetbaar is, en die de discussie over vrije wil voedt.","Basale ganglia met de directe, indirecte en hyperdirecte route: kernen die bewegingen automatiseren en op elkaar afstemmen via lussen die per saldo bewegingen versterken (direct), afremmen (indirect) of abrupt stoppen (hyperdirect).","Ziekte van Parkinson versus Huntington: bij Parkinson sterven dopaminerge neuronen in de substantia nigra af waardoor te weinig excitatie en te veel inhibitie ontstaat (moeite met starten), terwijl bij Huntington verlies van remmende GABA-neuronen leidt tot juist te weinig inhibitie en ongecontroleerde bewegingen.","Cerebellum: hersendeel dat als hulpcomputer snelle, complexe en voorspellende (ballistische) bewegingen coordineert en bijstuurt; bij schade ontstaat schokkerig, ongecoordineerd bewegen.","Spiegelneuronen: neuronen die zowel vuren bij het zelf uitvoeren als bij het observeren van een handeling met hetzelfde doel, en die helpen om intenties en handelingen van anderen te begrijpen.","Corollary discharge (forward model): een kopie van het motorische commando die naar zintuiglijke hersengebieden gaat om de gevolgen van eigen bewegingen te voorspellen, zodat eigen versus externe sensaties onderscheiden worden en problemen ermee samenhangen met hallucinaties bij schizofrenie."]},{"h":"Slaap en biologische ritmes","items":["Polysomnografie: meetmethode die meerdere signalen tegelijk registreert (EEG, oogbewegingen, spierspanning en vaak ook hartslag en temperatuur) om de opeenvolging van slaapstadia in kaart te brengen.","Slaaparchitectuur: de typische opbouw en volgorde waarin de verschillende slaapstadia elkaar gedurende de nacht in cycli afwisselen.","Delta-activiteit: trage, hoog-amplitude EEG-golven die wijzen op sterk gesynchroniseerde hersenactiviteit en kenmerkend zijn voor de diepe slaap (NREM3/SWS).","Slow Wave Sleep (SWS): de diepe non-REM-slaap (NREM3) met trage deltagolven, waaruit men moeilijk te wekken is en die vooral het consolideren van declaratief geheugen ondersteunt.","REM-slaap: slaapfase met snelle oogbewegingen, hoge en grillige hersenactiviteit, verlamde spieren en levendige dromen, die vooral non-declaratief leren en hersenontwikkeling ondersteunt.","Slaapspoelen: korte uitbarstingen van snelle EEG-activiteit (vooral in NREM2) die de slaap beschermen tegen verstoring en samenhangen met geheugenconsolidatie en performaal IQ.","REM-rebound: het verschijnsel dat na gericht onthouden van REM-slaap deze fase de volgende nacht in versterkte mate wordt ingehaald, wat op een belangrijke functie wijst.","Adenosine: stof die zich ophoopt naarmate je langer wakker bent en de meeste neuronen afremt, waardoor het fungeert als 'slaapstof' die de slaapdruk opbouwt (en door cafeïne wordt geblokkeerd).","Orexine: neuromodulator uit de laterale hypothalamus die vrijwel alle waaksystemen aandrijft en de slaap-waakovergang stabiel houdt; verlies ervan leidt tot narcolepsie.","Flip-flop systeem: schakelmechanisme waarbij slaapneuronen (vlPOA) en de vijf waaksystemen elkaar wederzijds remmen, zodat je steeds duidelijk ofwel slaapt ofwel wakker bent met snelle overgangen ertussen.","Circadiaans ritme: een ongeveer 24-uurs intern ritme dat slaap, hormonen, lichaamstemperatuur en spijsvertering aanstuurt en ook zonder licht doorloopt.","Nucleus suprachiasmaticus: kerngebied in de hypothalamus dat via lichtinput uit het netvlies fungeert als de centrale biologische klok, waarbij zelfs losse cellen via eiwit-feedbacklussen de tijd bijhouden.","Zeitgebers: externe tijdsignalen zoals licht die de inwendige biologische klok afstemmen op de werkelijke dag-nachtcyclus.","Narcolepsie: stoornis door verlies van orexineneuronen met plotselinge slaapaanvallen, slaapverlamming en kataplexie (plotse spierverslapping zonder bewustzijnsverlies, vaak door emotie uitgelokt)."]},{"h":"Stress","items":["Stressrespons: de reactie van het zenuwstelsel op een waargenomen dreiging (of opportuniteit), waarbij het lichaam reserves aanspreekt om met de situatie om te gaan.","Fight-or-flight-respons: een acute, sympathisch gedomineerde reactie die het lichaam maximaal van energie voorziet om te vechten of te vluchten, zelfs ten koste van de eigen reserves.","Freeze-respons: een toestand waarin het lichaam verstilt met vertraagde hartslag (parasympathische rem op het sympathische systeem), zodat men verborgen blijft en de situatie eerst kan inschatten voor men handelt.","Sympathisch-bijniermergsysteem (SAM): het snelle stresssysteem waarbij de hypothalamus het bijniermerg aanzet tot het vrijgeven van (nor)adrenaline in het bloed voor een directe lichamelijke boost.","HPA-as: het tragere hormonale stresssysteem waarbij hypothalamus (CRH), hypofyse (ACTH) en bijnierschors elkaar aansturen om uiteindelijk glucocorticoïden in het bloed te brengen.","Glucocorticoïden (GC): stresshormonen uit de bijnierschors, zoals cortisol, die via receptoren in vrijwel alle lichaamscellen werken en ook een rol spelen in het dag-nachtritme en de stofwisseling.","Negatieve feedbacklus: het remmende mechanisme, vooral aangestuurd vanuit de hippocampus, dat de stressrespons afbouwt en de glucocorticoïden weer naar hun basale niveau brengt.","CRH als neurotransmitter: corticotropine-releasing hormoon werkt niet alleen als boodschapper in de HPA-as maar heeft ook eigen, angstgerelateerde effecten in het brein (o.a. amygdala en locus coeruleus).","Developmental constraint: de visie dat de negatieve langetermijngevolgen van vroege, hevige stress de onvermijdelijke prijs zijn voor het overleven op korte termijn.","Predictieve adaptieve respons: de visie dat vroege omstandigheden (zoals voedselschaarste) het lichaam kalibreren in de verwachting dat die context blijft, wat later schadelijk wordt als de omgeving verandert.","Psycho-neuro-immunologie: het vakgebied dat beschrijft hoe stresshormonen de immuunwerking (o.a. via cytokines) onderdrukken, wat zich uit in tragere wondgenezing en zwakkere reacties op vaccins.","Locus van controle: de mate waarin iemand denkt zijn situatie te kunnen beïnvloeden; een interne locus van controle en waargenomen voorspelbaarheid verlagen de cortisolrespons op stress."]}],"hacks":[{"h":"Retina = ROD nacht, CONE kleur","t":"Staafjes (Rods) = nacht/zwart-wit, veel in de periferie; Kegeltjes (Cones) = Color/scherp, samengepakt in de fovea. Onthoud: 'Roden zien in de schemer, Kegels zien in kleur.'"},{"h":"RGB-kegels: kort-medium-lang = blauw-groen-rood","t":"Drie kegeltypes op golflengte: S=Short (blauw), M=Medium (groen), L=Long (rood). Van korte naar lange golf loopt het van blauw via groen naar rood, dezelfde volgorde als in de regenboog."},{"h":"Visuele banen: 'Waar boven, Wat onder'","t":"Dorsale baan (omhoog, parietaal) = WHERE/HOW (beweging, locatie, grijpen); ventrale baan (omlaag, temporaal) = WHAT (objecten, gezichten, kleur). Boven = waar je naartoe grijpt, onder = wat je vasthoudt."},{"h":"Slakkenhuis: basis hoog, top laag","t":"De cochlea codeert toonhoogte op plaats: de basis (begin) vangt hoge tonen, de top/apex vangt lage tonen. Net als een trompet geeft het smalle begin de hoge tonen; lage tonen reizen het verst naar binnen."},{"h":"Basale ganglia = gaspedaal en rem","t":"Directe baan = GAS (start beweging, dopamine helpt), indirecte baan = REM (onderdrukt ongewenste beweging). Parkinson = te weinig dopamine, rem blijft erop (traag/stijf); Huntington = rem kapot, te veel beweging (chorea)."},{"h":"Stress: eerst SAM, dan HPA","t":"Bij stress gaat eerst de snelle SAM-as aan (Sympathisch-Adrenaal-Medulla = adrenaline, vecht/vlucht in seconden), daarna de trage HPA-as (Hypothalamus-Hypofyse-bijnier = cortisol, minuten tot uren). Snel SAMmen, dan langzaam HPA."}]};
</script>

  };
  function ic(n,c){ return '<svg class="ic'+(c?" "+c:"")+'" viewBox="0 0 24 24" aria-hidden="true">'+(P[n]||"")+'</svg>'; }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
  function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }
  function pct(n,d){ return d?Math.round(100*n/d):0; }
  function rnd(a){ return a[Math.floor(Math.random()*a.length)]; }
  function lget(k,d){ try{ var v=JSON.parse(localStorage.getItem(k)); return v==null?d:v; }catch(e){ return d; } }
  function lset(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
  function rawGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function rawSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
  function bump(ns,key){ try{ fetch("https://abacus.jasoncameron.dev/hit/"+ns+"/"+key).then(function(){},function(){}); }catch(e){} }

  D.questions.forEach(function(q,i){ q.id="q"+i; });
  var theme=rawGet("site_theme") || lget("biopsy2_theme","light");
  function applyTheme(){ document.documentElement.setAttribute("data-theme",theme);
    document.getElementById("themeBtn").innerHTML=(theme==="dark"?ic("sun"):ic("moon"))+'<span>'+(theme==="dark"?"Licht":"Donker")+'</span>'; }
  applyTheme();
  document.getElementById("themeBtn").onclick=function(){ theme=theme==="dark"?"light":"dark"; lset("biopsy2_theme",theme); rawSet("site_theme",theme); applyTheme(); };
  var calm=lget("biopsy2_calm",true);
  function applyCalm(){ document.documentElement.classList.toggle("snappy", !calm); }
  applyCalm();
  function wrongLead(){ return calm ? rnd(WARM) : "Fout."; }

  var WARM=["Geen zorgen — hier leer je nu net van.","Bijna! Dit type vraag krijg je zo onder de knie.","Foutje mag — nu weet je wat je nog moet herhalen.","Niet erg, dit onthoud je de volgende keer wél.","Rustig — één foutje zegt niets over je examen."];
  var PRAISE=["Juist!","Goed zo!","Correct!","Sterk!","Knap!"];
  var TOPICS={"1":"Inleiding","2":"Zicht","3":"Gehoor, evenwicht, tast, smaak & geur","4":"Motoriek","5":"Slaap & biologische ritmes","6":"Stress"};
  function getProg(){ var p=lget("biopsy2_prog",{ans:{}}); if(!p||typeof p!=="object"||!p.ans)p={ans:{}}; return p; }
  function recordProg(qid,ok){ var p=getProg(); p.ans[qid]=ok?1:0; lset("biopsy2_prog",p); }
  function resetProg(){ lset("biopsy2_prog",{ans:{}}); }
  function chapterStats(){ var p=getProg(); var st={}; Object.keys(TOPICS).forEach(function(k){st[k]={total:0,done:0,correct:0};}); D.questions.forEach(function(q){ var s=st[q.t]; if(!s)return; s.total++; if(Object.prototype.hasOwnProperty.call(p.ans,q.id)){ s.done++; if(p.ans[q.id])s.correct++; } }); return st; }
  function startChapter(k){ var items=shuffle(D.questions.filter(function(q){return q.t===k;})); state.view="quiz"; tabBtns.forEach(function(b){b.classList.toggle("on",b.dataset.view==="quiz");}); startQuiz(items); window.scrollTo(0,0); }

  var TABS=[{v:"home",l:"Start",i:"book"},{v:"quiz",l:"Oefenvragen",i:"target"},{v:"theory",l:"Theorie",i:"search"},{v:"hacks",l:"Studie-hacks",i:"bulb"},{v:"feedback",l:"Feedback",i:"msg"}];
  var tabsEl=document.getElementById("tabs");
  tabsEl.innerHTML=TABS.map(function(t){return '<button data-view="'+t.v+'"'+(t.v==="home"?' class="on"':'')+'>'+ic(t.i)+'<span>'+t.l+'</span></button>';}).join("");
  var tabBtns=[].slice.call(tabsEl.querySelectorAll("button"));
  tabBtns.forEach(function(b){ b.onclick=function(){ state.fromHub=false; if(b.dataset.view==="home") state.step="track"; go(b.dataset.view); }; });
  function go(v){ state.view=v; tabBtns.forEach(function(b){b.classList.toggle("on",b.dataset.view===v);}); render(); window.scrollTo(0,0); }

  var state={view:"home", step:"track", track:lget("biopsy2_track","training"), quiz:null, sel:{topics:{"1":true,"2":true,"3":true,"4":true,"5":true,"6":true}, count:15, shuffle:true}, sumq:""};
  function setHTML(h){ app.innerHTML=h; }

  function render(){
    if(state.view==="home") return renderHome();
    if(state.view==="quiz") return renderQuizGate();
    if(state.view==="theory") return renderTheory();
    if(state.view==="hacks") return renderHacks();
    if(state.view==="feedback") return renderFeedback();
  }

  function renderHome(){
    if(state.step==="herkansing") return renderHerkansing();
    if(state.step==="practice") return renderPractice();
    return renderTrack();
  }
  function modeLabel(){ return state.track==="herkansing"?"Herkansing":"Examen Training"; }

  function renderTrack(){
    var byT={}; D.questions.forEach(function(q){byT[q.t]=(byT[q.t]||0)+1;});
    var st=chapterStats(); var tD=0,tQ=0,tC=0; Object.keys(st).forEach(function(k){tD+=st[k].done;tQ+=st[k].total;tC+=st[k].correct;});
    var html=
      '<div class="hero">'+
        '<div class="count"><b>'+D.questions.length+'</b><span>oefenvragen</span></div>'+
        '<div class="herotext"><h1>Biologische Psychologie 2 oefenen</h1>'+
        '<p>Oefenvragen per hoofdstuk, met uitleg</p></div>'+
      '</div>'+
      '<a class="brandstrip" href="https://beriesexamspace.github.io/" title="Naar Berie’s exam space"><span class="bs-logo">B</span><span class="bs-txt"><b>Berie’s exam space</b><small>Een ander vak leren? Bekijk alle vakken</small></span><span class="bs-go">'+ic("arrowR")+'</span></a>'+
      '<a class="brandstrip" href="https://beriesexamspace.github.io/?deel=1" title="Deel je samenvattingen"><span class="bs-logo">📚</span><span class="bs-txt"><b>Help mee — deel je vak</b><small>Heb jij samenvattingen of oude examenvragen? Stuur ze in (élk jaar).</small></span><span class="bs-go">'+ic("arrowR")+'</span></a>'+
      '<div class="seclabel">'+ic("rocket")+'Hoe wil je oefenen?</div>'+
      '<div class="tracks">'+
        '<button class="track" data-track="training"><span class="tile">'+ic("book")+'</span><b>Examen Training</b><small>Oefen op examenniveau. Vragen met directe feedback en uitleg.</small><span class="go">Normaal niveau '+ic("arrowR")+'</span></button>'+
        '<button class="track alt" data-track="herkansing"><span class="tile">'+ic("heart")+'</span><b>Herkansing</b><small>Rustig opbouwen, met aanmoediging. Jij bepaalt het tempo.</small><span class="go">Met begeleiding '+ic("arrowR")+'</span></button>'+
      '</div>'+
      '<div class="card pad choverview" style="margin-top:18px">'+
        '<div class="row" style="justify-content:space-between;align-items:center"><b>Kies een hoofdstuk</b>'+(tD>0?'<button type="button" class="bnlink" id="resetProg">'+ic("refresh")+'Reset</button>':'')+'</div>'+
        '<p class="muted" style="font-size:12.5px;margin:6px 0 12px">Klik een hoofdstuk om alleen dat te oefenen.'+(tD>0?' &middot; '+tD+'/'+tQ+' geoefend &middot; '+pct(tC,tD)+'% juist':'')+'</p>'+
        '<div class="chlist">'+Object.keys(TOPICS).map(function(k){var s=st[k];var w=pct(s.done,s.total);return '<button type="button" class="chrow" data-ch="'+k+'"><span class="chname">'+esc(TOPICS[k])+'</span><span class="chbar"><i style="width:'+w+'%"></i></span><span class="chval">'+s.done+'/'+s.total+'</span>'+ic("chevR","caret")+'</button>';}).join("")+'</div></div>';

    [].slice.call(document.querySelectorAll(".track")).forEach(function(el){ el.onclick=function(){ var t=el.dataset.track; state.track=t; lset("biopsy2_track",t); state.step=(t==="herkansing"?"herkansing":"practice"); renderHome(); window.scrollTo(0,0); }; });
  }

  function renderHerkansing(){
    var html=
      '<button class="backlink" id="backBtn">'+ic("back")+'Terug</button>'+
      '<div class="seclabel" style="margin-top:2px">'+ic("heart")+'Herkansing</div>'+
      (calm?'<div class="card pad warmcard"><div class="row" style="gap:11px;flex-wrap:nowrap;align-items:flex-start">'+ic("heart")+'<div><b>Een nieuwe kans — rustig aan.</b><p class="muted" style="margin:5px 0 0;font-size:13.5px">Herkansen betekent niet dat je het niet kunt. Stap voor stap kom je er. Jij kunt dit. 💙</p></div></div></div>':'')+
      '<div class="card pad" style="margin-top:12px"><div class="row" style="justify-content:space-between;align-items:center;gap:14px"><div><b>Rustige modus</b><div class="muted" style="font-size:12.5px">Aanmoediging en kalme sfeer. Zet uit als je liever recht-voor-z’n-raap oefent.</div></div><button class="toggle'+(calm?" on":"")+'" id="calmToggle" role="switch" aria-checked="'+(calm?"true":"false")+'" aria-label="Rustige modus aan of uit"><span class="knob"></span></button></div></div>'+
