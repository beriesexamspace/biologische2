  function renderPractice(){
    var herk=state.track==="herkansing";
    var html=
      '<button class="backlink" id="backBtn">'+ic("back")+'Terug</button>'+
      '<div class="modebanner'+(herk?" v":"")+'">'+ic(herk?"heart":"book")+'<span>'+modeLabel()+'</span><button type="button" class="bnlink" id="changeMode">wijzig</button></div>'+
      '<div class="seclabel">'+ic("rocket")+'Waarmee wil je oefenen?</div>'+
      '<div class="grid g2">'+
        '<button class="mode" data-mode="quiz"><span class="me">'+ic("target")+'</span><b>Oefenvragen</b><small>Meerkeuze met directe feedback en uitleg. Kies je onderwerpen.</small></button>'+
        '<button class="mode" id="quickStart"><span class="me">'+ic("rocket")+'</span><b>Snelle ronde</b><small>15 willekeurige vragen uit alle onderwerpen.</small></button>'+
      '</div>';
    setHTML(html);
    document.getElementById("backBtn").onclick=function(){ if(state.fromHub){ location.href="https://beriesexamspace.github.io/"; return; } state.step=(herk?"herkansing":"track"); renderHome(); window.scrollTo(0,0); };
    document.getElementById("changeMode").onclick=function(){ if(state.fromHub){ location.href="https://beriesexamspace.github.io/"; return; } state.step="track"; renderHome(); window.scrollTo(0,0); };
    document.querySelector('[data-mode="quiz"]').onclick=function(){ go("quiz"); };
    document.getElementById("quickStart").onclick=function(){ state.view="quiz"; tabBtns.forEach(function(b){b.classList.toggle("on",b.dataset.view==="quiz");}); startQuiz(shuffle(D.questions.slice()).slice(0,15)); window.scrollTo(0,0); };
  }

  function renderQuizGate(){
    if(state.quiz) return renderQuiz();
    var s=state.sel;
    function pool(){ return D.questions.filter(function(q){return s.topics[q.t];}); }
    var html='<div class="card pad"><h2 style="margin-top:0">Oefenvragen</h2>'+
      '<p class="muted">Kies onderwerpen en het aantal vragen. Na elk antwoord krijg je meteen feedback én de uitleg.</p>'+
      '<label class="fld">Onderwerpen</label><div class="chips" id="tps">'+
        Object.keys(TOPICS).map(function(k){return '<button class="chip'+(s.topics[k]?" on":"")+'" data-tp="'+k+'">'+esc(TOPICS[k])+'</button>';}).join("")+'</div>'+
      '<label class="fld">Aantal vragen</label><div class="chips" id="cnt">'+
        [10,15,20,999].map(function(n){return '<button class="chip'+(s.count===n?" on":"")+'" data-n="'+n+'">'+(n===999?"Alle":n)+'</button>';}).join("")+'</div>'+
      '<label class="fld"><input type="checkbox" id="shuf" '+(s.shuffle?"checked":"")+'> Willekeurige volgorde</label>'+
      '<div class="row" style="margin-top:18px"><button class="btn" id="startQ">Start '+ic("arrowR")+'</button><span class="muted" id="poolN"></span></div></div>';
    setHTML(html);
    function refresh(){ var n=pool().length; document.getElementById("poolN").textContent=n+" vragen beschikbaar"; document.getElementById("startQ").disabled=n===0; }
    [].slice.call(document.querySelectorAll("#tps .chip")).forEach(function(b){ b.onclick=function(){ s.topics[b.dataset.tp]=!s.topics[b.dataset.tp]; b.classList.toggle("on"); refresh(); }; });
    [].slice.call(document.querySelectorAll("#cnt .chip")).forEach(function(b){ b.onclick=function(){ s.count=+b.dataset.n; renderQuizGate(); }; });
    document.getElementById("shuf").onchange=function(e){ s.shuffle=e.target.checked; };
    document.getElementById("startQ").onclick=function(){ var p=pool(); if(s.shuffle)p=shuffle(p); if(s.count<p.length)p=p.slice(0,s.count); startQuiz(p); };
    refresh();
  }

  function startQuiz(items){ bump("berat-biopsy2", state.track==="herkansing"?"herkansing":"training"); state.quiz={items:items.map(function(q){return {q:q,opts:shuffle(q.o.map(function(t,i){return {text:t,ok:i===q.a};}))};}), idx:0, answered:false, picked:-1, correct:0, wrong:[], done:false}; renderQuiz(); }

  function renderQuiz(){
    var Q=state.quiz; if(Q.done) return renderResult();
    var cur=Q.items[Q.idx], q=cur.q;
    var html='<button class="backlink" id="backBtn">'+ic("back")+'Terug</button>'+
      '<div class="card pad">'+
      '<div class="runtop"><span class="pill">'+esc(TOPICS[q.t])+'</span><div class="bar"><i data-w="'+pct(Q.idx,Q.items.length)+'"></i></div><span>'+(Q.idx+1)+'/'+Q.items.length+'</span></div>'+
      '<div class="qtext">'+esc(q.q)+'</div>'+
      '<div id="opts">'+cur.opts.map(function(o,i){return '<button class="opt" data-i="'+i+'" style="--oi:'+(i*55)+'ms"><span class="k">'+String.fromCharCode(65+i)+'</span><span>'+esc(o.text)+'</span></button>';}).join("")+'</div>'+
      '<div id="fb"></div>'+
      '<div class="row" style="justify-content:space-between;margin-top:6px"><span class="muted" style="font-size:12px">Toets <span class="kbd">A–D</span> · <span class="kbd">Enter</span> = volgende</span><button class="btn hide" id="nextBtn">Volgende '+ic("arrowR")+'</button></div></div>';
    setHTML(html);
    var i2=document.querySelector(".bar>i"); requestAnimationFrame(function(){ if(i2) i2.style.width=i2.getAttribute("data-w")+"%"; });
    document.getElementById("backBtn").onclick=function(){ state.quiz=null; renderQuizGate(); };
    var optBtns=[].slice.call(document.querySelectorAll("#opts .opt"));
    var nb=document.getElementById("nextBtn"); nb.onclick=next;
    function showAnswered(i){
      optBtns.forEach(function(b){ var bi=+b.dataset.i; b.disabled=true; if(cur.opts[bi].ok)b.classList.add("correct"); else if(bi===i)b.classList.add("wrong"); });
      var ok=cur.opts[i].ok, fb=document.getElementById("fb"); fb.className="feedback "+(ok?"ok":"no");
      var juist=cur.opts.filter(function(o){return o.ok;})[0].text;
      fb.innerHTML=ok?"<b>"+rnd(PRAISE)+" ✓</b>":"<b>"+wrongLead()+"</b><span class=\"sub\">Juiste antwoord: "+esc(juist)+"</span>";
      var w=document.createElement("div"); w.innerHTML='<div class="whybox"><h4>'+ic("sparkles")+'Waarom?</h4>'+esc(q.u)+'</div>'; fb.appendChild(w);
      nb.classList.remove("hide"); nb.innerHTML=(Q.idx+1>=Q.items.length)?"Bekijk resultaat "+ic("arrowR"):"Volgende "+ic("arrowR");
    }
    function pick(i){ if(Q.answered)return; Q.answered=true; Q.picked=i; var ok=cur.opts[i].ok; if(ok)Q.correct++; else Q.wrong.push(q); recordProg(q.id, ok); showAnswered(i); nb.focus(); }
    optBtns.forEach(function(b){ b.onclick=function(){ pick(+b.dataset.i); }; });
    function next(){ if(!Q.answered)return; Q.idx++; Q.answered=false; Q.picked=-1; if(Q.idx>=Q.items.length)Q.done=true; renderQuiz(); }
    if(Q.answered) showAnswered(Q.picked);
    state.key=function(e){ if(!Q.answered){ var k=e.key.toLowerCase(); var idx="abcde".indexOf(k); if(idx<0&&/[1-5]/.test(k))idx=+k-1; if(idx>=0&&idx<cur.opts.length){pick(idx);e.preventDefault();} } else if(e.key==="Enter"||e.key===" "){ next(); e.preventDefault(); } };
  }

  function renderResult(){
    var Q=state.quiz, p=pct(Q.correct,Q.items.length);
    var msg=p>=80?"Sterk werk! 🎉":p>=60?"Goed bezig 👍":"Blijf oefenen — je komt er 💪";
    var html='<div class="card pad results center"><span class="pill">Biologische Psychologie 2</span><div class="big">'+p+'%</div>'+
      '<p style="font-weight:600;margin:0 0 4px;font-size:17px">'+msg+'</p><p class="muted">'+Q.correct+' van '+Q.items.length+' juist</p>'+
      '<div class="row" style="justify-content:center;margin-top:14px">'+
        (Q.wrong.length?'<button class="btn" id="retry">Herhaal '+Q.wrong.length+' foute vragen</button>':'')+
        '<button class="btn ghost" id="again">Nieuwe ronde</button><button class="btn ghost" id="home">Naar start</button></div></div>';
    setHTML(html);
    var rt=document.getElementById("retry"); if(rt) rt.onclick=function(){ startQuiz(shuffle(Q.wrong)); };
    document.getElementById("again").onclick=function(){ state.quiz=null; renderQuizGate(); };
    document.getElementById("home").onclick=function(){ state.quiz=null; go("home"); };
    state.key=null;
  }

  function renderTheory(){
    var q=state.sumq||"";
    var html='<div class="card pad" style="margin-bottom:14px"><h2 style="margin:0 0 8px">Theorie — samenvatting</h2>'+
      '<input type="search" id="sq" placeholder="Zoek een begrip… (bv. retina, tonotopie, REM-slaap)" value="'+esc(q)+'"></div><div id="list">'+theoryList(q)+'</div>';
    setHTML(html);
    var si=document.getElementById("sq"); si.oninput=function(){ state.sumq=si.value; document.getElementById("list").innerHTML=theoryList(si.value); si.focus(); };
  }
  function theoryList(query){
    var Q=query.trim().toLowerCase(), out="", n=0;
    D.theory.forEach(function(sec){
      var items=sec.items.filter(function(it){ return !Q || it.toLowerCase().indexOf(Q)>=0 || sec.h.toLowerCase().indexOf(Q)>=0; });
      if(!items.length) return; n++;
      out+='<details class="acc"'+(Q?" open":(n===1?" open":""))+'><summary><span class="n">'+ic("search")+'</span>'+esc(sec.h)+ic("chevR","caret")+'</summary><div class="body"><ul>'+items.map(function(it){return '<li>'+hl(esc(it),Q)+'</li>';}).join("")+'</ul></div></details>';
    });
    return out||'<p class="muted center">Geen resultaten voor "'+esc(query)+'".</p>';
  }
  function hl(t,q){ if(!q)return t; try{ return t.replace(new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig"),"<mark>$1</mark>"); }catch(e){ return t; } }

  function renderHacks(){
    var html='<div class="card pad" style="margin-bottom:16px"><h2 style="margin:0 0 6px">Studie-hacks</h2><p class="muted" style="margin:0">Ezelsbruggetjes om de kernideeën van biologische psychologie te onthouden.</p></div>'+
      '<div class="tipgrid">'+D.hacks.map(function(t){return '<div class="tip"><h4>'+ic("bulb")+esc(t.h)+'</h4><p>'+esc(t.t)+'</p></div>';}).join("")+'</div>';
    setHTML(html);
  }

  function renderFeedback(){
    var html='<div class="card pad"><h2 style="margin-top:0">Feedback &amp; klachten</h2>'+
      '<p class="muted">Fout in een vraag, een idee, of werkt iets niet? Laat het hier weten — het komt rechtstreeks bij de maker terecht. Een review of compliment mag ook: de mooiste tonen we op de hub. 💬</p>'+
      '<label class="fld" for="fbMsg">Je bericht</label><textarea id="fbMsg" rows="5" placeholder="Beschrijf de fout of je idee…"></textarea>'+
      '<label class="fld" for="fbWaar">Over welke vraag? <span class="muted">(optioneel)</span></label><input type="text" id="fbWaar" placeholder="bv. de vraag over de p-waarde">'+
      '<label class="fld" for="fbNaam">Je naam <span class="muted">(optioneel)</span></label><input type="text" id="fbNaam" placeholder="zodat we je kunnen bedanken">'+
      '<label class="fld" for="fbEmail">Je e-mail <span class="muted">(optioneel — als je een antwoord wilt)</span></label><input type="email" id="fbEmail" placeholder="naam@voorbeeld.be">'+
      '<input type="text" id="fbBot" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;opacity:0">'+
      '<div class="row" style="margin-top:16px;align-items:center"><button class="btn" id="fbSend">'+ic("send")+'Versturen</button><span id="fbStatus" style="font-size:13px"></span></div></div>';
    setHTML(html);
    document.getElementById("fbSend").onclick=function(){
      var status=document.getElementById("fbStatus");
      if(document.getElementById("fbBot").value) return;
      var msg=document.getElementById("fbMsg").value.trim();
      if(!msg){ status.style.color="var(--bad)"; status.textContent="Schrijf eerst een bericht."; return; }
      var btn=document.getElementById("fbSend"); btn.disabled=true; status.style.color="var(--muted)"; status.textContent="Versturen…";
      var em=document.getElementById("fbEmail").value.trim();
      var nm=document.getElementById("fbNaam").value.trim();
      var waar=document.getElementById("fbWaar").value.trim();
      var payload={_subject:"Biologische Psychologie 2-tool: feedback", _template:"table", _captcha:"false",
        Naam:nm||"-", Over_welke_vraag:waar||"-", email:em||"-", Bericht:msg};
      if(em) payload._replyto=em;
      // vangnet: als de verzenddienst blokkeert (bv. spamfilter) of er is geen verbinding,
      // bieden we een directe mailto-knop aan zodat de melding NOOIT stilletjes verdwijnt.
      function failFallback(reden){
        var body="Feedback Biologische Psychologie 2-tool%0D%0A%0D%0ANaam: "+encodeURIComponent(nm||"-")+"%0D%0AOver welke vraag: "+encodeURIComponent(waar||"-")+"%0D%0AE-mail: "+encodeURIComponent(em||"-")+"%0D%0A%0D%0ABericht:%0D%0A"+encodeURIComponent(msg);
        var mailto="mailto:berat007yildirim@gmail.com?subject="+encodeURIComponent("Biologische Psychologie 2-tool: feedback")+"&body="+body;
        setHTML('<div class="card pad"><h2 style="margin-top:0">Automatisch versturen lukte niet</h2><p class="muted">'+reden+' Geen zorgen — klik hieronder en je melding wordt geopend in je e-mail, helemaal klaar om te versturen:</p><a class="btn" href="'+mailto+'">'+ic("send")+'Mail mijn melding direct</a><div style="margin-top:14px"><button class="btn ghost" id="bk">Terug naar start</button></div></div>');
        document.getElementById("bk").onclick=function(){go("home");};
      }
      fetch("https://formsubmit.co/ajax/Berat007yildirim@gmail.com",{method:"POST",headers:{Accept:"application/json"},body:new URLSearchParams(payload)})
        .then(function(r){return r.json();}).then(function(d){
          if(d&&(d.success===true||d.success==="true")){ setHTML('<div class="card pad results center"><div style="font-size:42px">✅</div><h2 style="margin:6px 0">Bedankt!</h2><p class="muted">Je melding is verstuurd.</p><button class="btn" id="bk" style="margin-top:8px">Terug naar start</button></div>'); document.getElementById("bk").onclick=function(){go("home");}; }
          else { failFallback("Het automatisch versturen lukte niet."); }
        }).catch(function(){ failFallback("Er was even geen verbinding."); });
    };
  }

  document.addEventListener("keydown",function(e){ if(state.key) state.key(e); });
  // bezoeker tellen (1x per toestel)
  try{ if(!localStorage.getItem("biopsy2_seen")){ localStorage.setItem("biopsy2_seen","1"); bump("berat-biopsy2","gebruikers"); } }catch(e){ bump("berat-biopsy2","gebruikers"); }
  // traject vanuit de hub overnemen → direct naar de oefenpagina
  try{ var _q=new URLSearchParams(location.search); var _m=_q.get("m");
    if(_m==="training"||_m==="herkansing"){ state.track=_m; lset("biopsy2_track",_m);
      var _c=_q.get("calm"); if(_c!=null){ calm=(_c!=="0"); lset("biopsy2_calm",calm); applyCalm(); }
      state.step="practice"; state.fromHub=true; }
  }catch(e){}
  render();
  // launch-splash netjes laten verdwijnen
  (function(){ var _sp=document.getElementById("splash"); if(!_sp) return; var _red=false; try{_red=window.matchMedia("(prefers-reduced-motion: reduce)").matches;}catch(e){} setTimeout(function(){ _sp.classList.add("hide"); setTimeout(function(){ if(_sp&&_sp.parentNode) _sp.parentNode.removeChild(_sp); }, 700); }, _red?300:1850); })();
})();
</script>
